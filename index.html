<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Shop Quần Áo</title>
<style>
body{
    font-family: Arial;
    margin:0;
    background:#f5f5f5;
}
header{
    background:black;
    color:white;
    padding:15px;
    text-align:center;
}
.products{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:20px;
}
.card{
    background:white;
    padding:15px;
    width:200px;
    text-align:center;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.card img{
    width:100%;
}
button{
    background:black;
    color:white;
    border:none;
    padding:5px 10px;
    margin:5px;
    cursor:pointer;
}
.cart{
    background:white;
    margin:20px;
    padding:15px;
    border-radius:10px;
}
#checkoutForm{
    display:none;
    background:white;
    padding:20px;
    margin:20px;
    border-radius:10px;
}
input{
    width:100%;
    padding:8px;
    margin:5px 0;
}
.success{
    color:green;
    font-weight:bold;
}
</style>
</head>
<body>

<header>
<h1>SHOP QUẦN ÁO</h1>
</header>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Áo Thun</h3>
<p>150000đ</p>
<button onclick="addToCart('Áo Thun',150000)">Thêm</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Quần Jeans</h3>
<p>300000đ</p>
<button onclick="addToCart('Quần Jeans',300000)">Thêm</button>
</div>

</section>

<section class="cart">
<h2>Giỏ hàng (<span id="count">0</span>)</h2>
<ul id="cartList"></ul>
<h3>Tổng: <span id="total">0</span>đ</h3>
<button onclick="showCheckout()">Đặt hàng</button>
</section>

<section id="checkoutForm">
<h2>Thông tin khách hàng</h2>
<input type="text" id="name" placeholder="Tên của bạn">
<input type="text" id="phone" placeholder="Số điện thoại">
<input type="text" id="address" placeholder="Địa chỉ">
<button onclick="checkout()">Xác nhận đặt hàng</button>
<p id="message" class="success"></p>
</section>

<script>
let cart = [];

function addToCart(name, price){
    let existing = cart.find(item => item.name === name);
    if(existing){
        existing.quantity++;
    } else {
        cart.push({name, price, quantity:1});
    }
    renderCart();
}

function renderCart(){
    let cartList = document.getElementById("cartList");
    cartList.innerHTML="";
    let total=0;

    cart.forEach((item,index)=>{
        let li=document.createElement("li");
        li.innerHTML=`
        ${item.name} - ${item.price}đ x ${item.quantity}
        <button onclick="increase(${index})">+</button>
        <button onclick="decrease(${index})">-</button>
        <button onclick="removeItem(${index})">X</button>
        `;
        cartList.appendChild(li);
        total+=item.price*item.quantity;
    });

    document.getElementById("total").innerText=total;
    document.getElementById("count").innerText=cart.length;
}

function increase(index){
    cart[index].quantity++;
    renderCart();
}

function decrease(index){
    if(cart[index].quantity>1){
        cart[index].quantity--;
    }
    renderCart();
}

function removeItem(index){
    cart.splice(index,1);
    renderCart();
}

function showCheckout(){
    if(cart.length===0){
        alert("Giỏ hàng trống!");
        return;
    }
    document.getElementById("checkoutForm").style.display="block";
}

function checkout(){
    let name=document.getElementById("name").value;
    let phone=document.getElementById("phone").value;
    let address=document.getElementById("address").value;

    if(name===""||phone===""||address===""){
        alert("Vui lòng nhập đầy đủ thông tin");
        return;
    }

    document.getElementById("message").innerText="Đặt hàng thành công!";
    cart=[];
    renderCart();
    document.getElementById("checkoutForm").reset;
}
</script>

</body>

</html>
